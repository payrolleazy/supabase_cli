name: Deploy Payrolleazy Supabase Changes

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install repo tooling
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local database from checked-in migrations
        run: supabase db reset

      - name: Run local certification gate
        run: npm test

      - name: Link live payrolleazy project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push checked-in migrations to live project
        run: supabase db push
