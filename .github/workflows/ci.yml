name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  supabase-local-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install repo tooling
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Materialize local edge env
        run: cp supabase/functions/local-runtime.env.example supabase/functions/.env

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local database from checked-in migrations
        run: supabase db reset

      - name: Show local service status
        run: supabase status

      - name: Run certification stack
        run: npm test
